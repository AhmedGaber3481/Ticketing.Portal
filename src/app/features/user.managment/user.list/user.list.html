<div class="container container-fluid">
    <div class="col-md-12 mx-auto mt-5">
    <div class="card">
        <div class="card-body">
            <h4 class="card-title mb-4">User Management</h4>
        </div>

  @if(isLoading){
    <app-loader [size]="'medium'" [variant]="'primary'" [text]="'Loading...'" className="mt-4"></app-loader>
  }
  @else{
  <div class="bg-white rounded-lg border border-gray-200 overflow-hidden shadow-sm">
    <div class="overflow-x-auto">
      <table class="w-full">
        <thead class="bg-gray-50 border-b border-gray-200">
          <tr>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-700 uppercase tracking-wider">
              User ID
            </th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-700 uppercase tracking-wider">
              Username
              <button type="button" class="btn btn-link btn-sm p-0" (click)="sortByUsername()">
                    <span class="sort-icon">{{ getSortSymbol() }}</span>
                </button>
            </th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-700 uppercase tracking-wider">
              Full Name
            </th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-700 uppercase tracking-wider">
              Email
            </th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-700 uppercase tracking-wider">
              Phone Number
            </th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-700 uppercase tracking-wider">
              Role
            </th>
          </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
          <tr
            *ngFor="let user of users; let index = index"
            [class]="'bg-white hover:bg-gray-100 transition-colors'"
            [class.bg-gray-50]="index % 2 === 1"
            style="height: 56px">
            <td class="px-4 py-3 whitespace-nowrap text-sm font-medium text-gray-900">
              {{ user.userId }}
            </td>
            <td class="px-4 py-3 text-sm text-gray-900">
              {{ user.username }}
            </td>
            <td class="px-4 py-3 text-sm text-gray-900">
              {{ user.userFullName }}
            </td>
            <td class="px-4 py-3 text-sm text-gray-600">
              {{ user.email }}
            </td>
            <td class="px-4 py-3 text-sm text-gray-600">
              {{ user.phoneNumber }}
            </td>
            <td class="px-4 py-3 whitespace-nowrap text-sm">
              <span>
                {{ user.userRole }}
              </span>
            </td>
          </tr>
        </tbody>
      </table>
  </div>
    <div *ngIf="users.length === 0" class="py-12 text-center">
      <p class="text-gray-500 text-sm">No users found</p>
    </div>
  </div>
  }

   <app-paging
        (pageLoadEvent)="onPageChange($event)"
        [pageSize]="pageSize"
        [totalRows]="totalCount"
        [countPages]="countPages">
    </app-paging>
    </div>
    </div>
</div>
