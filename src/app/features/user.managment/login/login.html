<div class="container">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6 col-xl-5">
      <div class="card shadow-lg border-0">
        <div class="card-body p-4 p-md-5">
          <div class="text-center mb-4">
            <h1 class="h3 mb-2">{{ 'LOGIN_BUTTON' | translate }}</h1>
            <p class="text-muted">{{ 'LOGIN_NOTE' | translate }}</p>
          </div>

          <form [formGroup]="form" (ngSubmit)="submit()">
            <!-- Username Field -->
            <div class="mb-4">
              <label for="username" class="form-label">
                {{ 'USERNAME' | translate }}
              </label>
              <div class="input-group">
                <span class="input-group-text bg-light">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-muted">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                  </svg>
                </span>
                <input
                  type="text"
                  class="form-control"
                  [class.is-invalid]="form.get('username')?.invalid && form.get('username')?.touched"
                  id="username"
                  formControlName="username"
                  name="username"
                  placeholder="{{ 'ENTER_USERNAME' | translate }}"
                />
                <div *ngIf="form.controls['username']?.errors?.['required'] && form.get('username')?.touched" class="invalid-feedback">
                   {{ 'USERNAME_REQUIRED' | translate }}
                </div>
              </div>
            </div>

            <!-- Password Field -->
            <div class="mb-4">
              <label for="password" class="form-label">
                {{ 'PASSWORD' | translate }}
              </label>
              <div class="input-group">
                <span class="input-group-text bg-light">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-muted">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                  </svg>
                </span>
                <input
                  [type]="showPassword ? 'text' : 'password'"
                  class="form-control"
                  [class.is-invalid]="form.get('password')?.invalid && form.get('password')?.touched"
                  id="password"
                  formControlName="password"
                  name="password"
                  placeholder="{{ 'ENTER_PASSWORD' | translate }}"
                />
                <button
                  type="button"
                  class="btn btn-outline-secondary"
                  (click)="togglePassword()"
                >
                  <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                  <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                  </svg>
                </button>
                <div *ngIf="form.controls['password']?.errors?.['required'] && form.get('password')?.touched" class="invalid-feedback">
                  {{ 'PASSWORD_REQUIRED' | translate }}
                </div>
              </div>
            </div>

            <!-- Remember Me & Forgot Password -->
            <!-- <div class="d-flex justify-content-between align-items-center mb-4">
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="checkbox"
                  id="rememberMe"
                  name="rememberMe"
                />
                <label class="form-check-label" for="rememberMe">
                  Remember me
                </label>
              </div>
              <a href="#" class="text-decoration-none small" (click)="onForgotPassword(); $event.preventDefault()">
                Forgot password?
              </a>
            </div> -->

            <!-- Login Button -->
            <button type="submit" class="btn btn-primary w-100 py-2 mb-3">
              {{ 'LOGIN_BUTTON' | translate }}
            </button>

            <!-- Sign Up Link -->
            <!-- <p class="text-center text-muted small mb-0">
              Don't have an account?{' '}
              <a href="#" class="text-decoration-none" (click)="onSignUp(); $event.preventDefault()">
                Sign up
              </a>
            </p> -->
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
