<div class="card border" style="width: 100%; max-width: 480px; border-color: #dee2e6;">
  <div class="card-body" style="padding: 24px;">
    <h4 class="card-title mb-4">Create Account</h4>
    
    <div *ngIf="submitted" class="alert alert-success" role="alert">
      <strong>Success!</strong> Your account has been created successfully.
    </div>

    <form [formGroup]="registrationForm" (ngSubmit)="onSubmit()">
      <!-- Username -->
      <div class="mb-3">
        <label for="username" class="form-label">
          Username <span class="text-danger">*</span>
        </label>
        <input
          type="text"
          class="form-control"
          [class.is-invalid]="isFieldInvalid('username')"
          id="username"
          formControlName="username"
          placeholder="Choose a username"
        />
        <div *ngIf="isFieldInvalid('username')" class="invalid-feedback">
          {{ getErrorMessage('username') }}
        </div>
      </div>

      <!-- Email -->
      <div class="mb-3">
        <label for="email" class="form-label">
          Email <span class="text-danger">*</span>
        </label>
        <input
          type="email"
          class="form-control"
          [class.is-invalid]="isFieldInvalid('email')"
          [class.is-valid]="isEmailValid()"
          id="email"
          formControlName="email"
          placeholder="your.email@example.com"
        />
        <div *ngIf="isFieldInvalid('email')" class="invalid-feedback">
          {{ getErrorMessage('email') }}
        </div>
        <div *ngIf="isEmailValid() && !isFieldInvalid('email')" class="valid-feedback">
          Email looks good!
        </div>
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label for="password" class="form-label">
          Password <span class="text-danger">*</span>
        </label>
        <div class="input-group">
          <input
            [type]="showPassword ? 'text' : 'password'"
            class="form-control"
            [class.is-invalid]="isFieldInvalid('password')"
            id="password"
            formControlName="password"
            placeholder="Create a strong password"
          />
          <button
            class="btn btn-outline-secondary"
            type="button"
            (click)="togglePasswordVisibility()"
            [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
          >
            <svg *ngIf="showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
            <svg *ngIf="!showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div *ngIf="isFieldInvalid('password')" class="invalid-feedback d-block">
          {{ getErrorMessage('password') }}
        </div>
        
      </div>

      <!-- Full Name -->
      <div class="mb-3">
        <label for="fullName" class="form-label">
          Full Name <span class="text-danger">*</span>
        </label>
        <input
          type="text"
          class="form-control"
          [class.is-invalid]="isFieldInvalid('fullName')"
          id="fullName"
          formControlName="fullName"
          placeholder="Enter your full name"
        />
        <div *ngIf="isFieldInvalid('fullName')" class="invalid-feedback">
          {{ getErrorMessage('fullName') }}
        </div>
      </div>

      <!-- Phone Number -->
      <div class="mb-4">
        <label for="phoneNumber" class="form-label">
          Phone Number <span class="text-danger">*</span>
        </label>
        <div class="input-group">
          <select
            class="form-select"
            formControlName="countryCode"
            style="max-width: 120px;"
          >
            <option *ngFor="let country of countryCodes" [value]="country.code">
              {{ country.code }} ({{ country.country }})
            </option>
          </select>
          <input
            type="tel"
            class="form-control"
            [class.is-invalid]="isFieldInvalid('phoneNumber')"
            id="phoneNumber"
            formControlName="phoneNumber"
            placeholder="123-456-7890"
          />
        </div>
        <div *ngIf="isFieldInvalid('phoneNumber')" class="invalid-feedback d-block">
          {{ getErrorMessage('phoneNumber') }}
        </div>
      </div>

      <!-- Submit Button -->
      <div class="d-grid mb-3">
        <button type="submit" class="btn btn-primary" [disabled]="registrationForm.invalid">
          Create Account
        </button>
      </div>

      <!-- Sign In Link -->
      <div class="text-center">
        <small class="text-muted">
          Already have an account? 
          <a href="#" class="text-decoration-none" (click)="$event.preventDefault()">Sign in</a>
        </small>
      </div>
    </form>
  </div>
</div>
