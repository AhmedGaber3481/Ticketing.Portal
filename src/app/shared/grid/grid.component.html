 <div class="row">
    <div class="col-sm-12 col-md-5">
        <div class="dataTables_info" role="status" aria-live="polite">{{ pagingTitle }}</div>
    </div>
    <div class="col-sm-12 col-md-7">
        <div class="dataTables_paginate paging_simple_numbers">
            <ul class="pagination">
                <li (click)="previousPage()" class="paginate_button page-item previous disabled">
                    <a tabindex="0" class="page-link">Previous</a>
                </li>
                <li (click)="getPage(page)" *ngFor="let page of displayedPages" class="page-item" [ngClass]="{ 'active': page == pageIndex }">
                    <a tabindex="0" class="page-link">{{page}}</a>
                </li>
                
                <li (click)="nextPage()" class="paginate_button page-item next">
                    <a  tabindex="0" class="page-link">Next</a>
                </li>
            </ul>
    </div>
    </div>
</div>
