<a
  class="nav-link dropdown-toggle d-flex align-items-center"
  href="#"
  id="languageDropdown"
  role="button"
  data-bs-toggle="dropdown"
  aria-expanded="false">
  <svg class="me-1" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"></circle>
    <line x1="2" y1="12" x2="22" y2="12"></line>
    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
  </svg>
  <span class="d-none d-lg-inline"> {{ getCurrentLanguageNativeName() }}</span>
</a>
<ul class="dropdown-menu dropdown-menu-end"  aria-labelledby="languageDropdown">
    <li *ngFor="let lang of getAvailableLanguages()">
      <button class="dropdown-item" (click)="changeLanguage(lang.code)" 
         [class.active]="currentLanguage === lang.code">
        {{ lang.nativeName }}
      </button>
    </li>
  </ul>
